services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sedi_development
    ports:
      - "5500:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  enrichment:
    build: ./enrichment
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3500:3500"
    depends_on:
      db:
        condition: service_healthy
      enrichment:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CORS_ORIGINS: http://localhost:5173
      ENRICHMENT_SERVICE_URL: http://enrichment:8000
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle exec rails db:migrate &&
               bundle exec rails server -b 0.0.0.0 -p 3500"
    # First-time setup: docker compose run --rm backend bundle exec rails db:seed
    # Or use: make setup

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:3500

volumes:
  postgres_data:
